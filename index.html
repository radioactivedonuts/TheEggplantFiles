@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

:root{

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,sans-serif;
color:var(--text);
background:
radial-gradient(circle at top left,#2563eb33,transparent 35%),

.sidebar{
position:fixed;
left:0;
top:0;
width:95px;

.sidebar-btn{

min-height:58px;

backdrop-filter:blur(20px);

transition:.25s;

.sidebar-btn:hover{
transform:translateY(-2px);
box-shadow:0 8px 25px rgba(59,130,246,.35);
}

.main-content{
margin-left:110px;

}

h1{

#lolbutton{
padding:15px 24px;
border:none;

.letter-section{
max-width:1200px;
margin:30px auto;
padding:30px;

.buttons-container{

input[type="button"]{

background:linear-gradient(135deg,rgba(255,255,255,.18),rgba(255,255,255,.05));

color:white;

input[type="button"]:hover{
transform:translateY(-3px) scale(1.01);
box-shadow:0 15px 40px rgba(59,130,246,.3);

</style>

<style>
body{background:#0b0b0b;color:white;font-family:Inter,sans-serif;}

.toolbar{display:flex;gap:12px;justify-content:center;margin:10px 0 15px 0;}
.toolbar button{padding:12px 16px;border-radius:14px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:white;cursor:pointer;font-weight:600;transition:0.2s;}
.toolbar button:hover{background:rgba(255,255,255,0.18);}

#mainSearch{width:100%;max-width:420px;padding:12px;border-radius:10px;border:none;margin:10px auto;display:block;}

.game{position:relative;}
.game button{
 width:100%;padding:20px;border-radius:18px;border:1px solid rgba(255,255,255,0.2);
 background:rgba(255,255,255,0.08);color:white;text-align:left;cursor:pointer;
 transition:all 0.25s ease;overflow:hidden;
}

.game button::before{
 content:"";position:absolute;top:0;left:-100%;width:100%;height:100%;
 background:linear-gradient(120deg, transparent, rgba(255,255,255,0.35), transparent);
 transition:0.5s;
}
.game button:hover::before{left:100%;}

.game button:hover{
 transform:translateY(-3px) scale(1.02);
 background:rgba(255,255,255,0.18);
 box-shadow:0 10px 25px rgba(0,0,0,0.4),0 0 15px rgba(255,255,255,0.25);
}

.star{position:absolute;right:15px;top:50%;transform:translateY(-50%);font-size:28px;cursor:pointer;}
.game:hover .star{transform:translateY(-50%) scale(1.2);color:gold;}

#favPanel{position:fixed;right:0;top:0;width:280px;height:100%;background:#111;color:#fff;padding:15px;transform:translateX(100%);transition:.3s;overflow:auto;}
#favPanel.open{transform:translateX(0)}

.eggplant{position:fixed;pointer-events:none;animation:spin linear infinite;opacity:0.8;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
</style>

<script>
let favourites=[];

function lucky(){
 const g=document.querySelectorAll('.game button');
 if(!g.length)return;
 g[Math.floor(Math.random()*g.length)].click();
}

function openFav(){
 const p=document.getElementById('favPanel');
 p.innerHTML='<h2>⭐ Favorites</h2>';
 favourites.forEach(name=>{
   const d=document.createElement('div');
   d.textContent=name;
   d.style.margin='8px 0';
   d.onclick=()=>{
     const btn=[...document.querySelectorAll('.game button')].find(b=>b.textContent===name);
     if(btn) btn.click();
   };
   p.appendChild(d);
 });
 p.classList.toggle('open');
}

function createEggplants(){
 for(let i=0;i<25;i++){
   const el=document.createElement('div');
   el.className='eggplant';
   el.textContent='🍆';
   el.style.left=Math.random()*100+'vw';
   el.style.top=Math.random()*100+'vh';
   el.style.fontSize=(20+Math.random()*60)+'px';
   el.style.animationDuration=(8+Math.random()*12)+'s';
   document.body.appendChild(el);
 }
}

function rebuildGames(){
 const inputs=document.querySelectorAll('input[type="button"]');
 inputs.forEach(old=>{
   const wrapper=document.createElement('div');
   wrapper.className='game';

   const btn=document.createElement('button');
   btn.textContent=old.value;
   btn.onclick=old.onclick;

   const star=document.createElement('span');
   star.className='star';
   star.textContent='☆';

   star.onclick=(e)=>{
     e.stopPropagation();
     const name=btn.textContent;
     if(favourites.includes(name)){
       favourites=favourites.filter(x=>x!==name);
       star.textContent='☆';
     }else{
       favourites.push(name);
       star.textContent='★';
     }
   };

   wrapper.appendChild(btn);
   wrapper.appendChild(star);
   old.replaceWith(wrapper);
 });
}

function setupSearch(){
 const input=document.getElementById('mainSearch');
 input.addEventListener('input',()=>{
   const term=input.value.toLowerCase();
   document.querySelectorAll('.game').forEach(game=>{
     const name=game.querySelector('button').textContent.toLowerCase();
     game.style.display = name.includes(term) ? 'block' : 'none';
   });
 });
}

// shortcut
document.addEventListener('keydown',(e)=>{
 if(e.ctrlKey && e.shiftKey && e.key.toLowerCase()==='z'){
   window.location.href='https://app.educationperfect.com/learning/dashboard';
 }
});

window.addEventListener('load',()=>{
 createEggplants();
 setTimeout(()=>{
   rebuildGames();
   setupSearch();
 },2000);
});
</script>
</head>

    <script>
// =====================
// PANIC SYSTEM (FULL)
// =====================
let panicKey = prompt("Set panic key (1 key):") || "z";
let panicURL = prompt("Set panic website:") || "https://classroom.google.com/";

function panic(){
  window.location.href = panicURL;
}

// key trigger
document.addEventListener("keydown", (e)=>{
  if(e.key.toLowerCase() === panicKey.toLowerCase()){
    panic();
  }
});

// =====================
// TURN DASHBOARD INTO PANIC
// =====================
document.querySelectorAll("button").forEach(btn=>{
  if(btn.innerText.toLowerCase().includes("dashboard")){
    btn.innerText = "🚨 Panic";
    btn.onclick = panic;
  }
});

// =====================
// ADD CLICKER BUTTON
// =====================
const toolbar = document.querySelector(".toolbar");
if(toolbar){
  const clicker = document.createElement("button");
  clicker.innerText = "🍆 Clicker";
  clicker.onclick = () => {
    window.location.href = "https://radioactivedonuts.github.io/EggplantClicker/";
  };
  toolbar.appendChild(clicker);
}

// =====================
// FIX SEARCH (REAL FIX)
// =====================
const search =
  document.getElementById("mainSearch") ||
  document.getElementById("searchInput");

if(search){
  search.addEventListener("input", ()=>{
    const term = search.value.toLowerCase();

    document.querySelectorAll(".game").forEach(game=>{
      const btn = game.querySelector("button");
      if(!btn) return;

      const name = btn.textContent.toLowerCase();
      game.style.display = name.includes(term) ? "block" : "none";
    });
  });
}

// =====================

`;
