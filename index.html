<script>
let favourites = JSON.parse(localStorage.getItem("favourites") || "[]");
let eggplants = parseInt(localStorage.getItem("eggplants")) || 0;
let admin = localStorage.getItem("admin") === "true";
let unlocks = JSON.parse(localStorage.getItem("unlocks") || "{}");
let currentTheme = localStorage.getItem("theme") || "default";

function clearThemeEffects(){
  document.querySelectorAll(".fx-emoji").forEach(e => e.remove());
  const starField = document.querySelector(".star-field");
  if(starField) starField.remove();
}

function lucky(){
 const g=document.querySelectorAll('.game button');
 if(!g.length)return;
 g[Math.floor(Math.random()*g.length)].click();
}

function updateEggplants(){
  const el = document.getElementById("eggplantAmount");
  if(eggplants === Infinity){
    el.textContent = "∞";
  } else {
    el.textContent = Math.floor(eggplants);
  }
  localStorage.setItem("eggplants", String(eggplants));
}

function openFav(){
 const p=document.getElementById('favPanel');
 p.innerHTML='<h2>⭐ Favorites</h2>';
 favourites.forEach(name=>{
   const d=document.createElement('div');
   d.textContent=name;
   d.style.margin='8px 0';
   d.style.cursor='pointer';
   d.onclick=()=>{
     const btn=[...document.querySelectorAll('.game button')].find(b=>b.textContent===name);
     if(btn) btn.click();
   };
   p.appendChild(d);
 });
 p.classList.toggle('open');
}

function createEggplants(){
 for(let i=0;i<25;i++){
   const el=document.createElement('div');
   el.className='eggplant';
   el.textContent='🍆';
   el.style.left=Math.random()*100+'vw';
   el.style.top=Math.random()*100+'vh';
   el.style.fontSize=(20+Math.random()*60)+'px';
   el.style.animationDuration=(8+Math.random()*12)+'s';
   document.body.appendChild(el);
 }
}

// ==================== THEME FUNCTIONS ====================

function clearThemeEffects(){
  document.querySelectorAll(".fx-emoji").forEach(e => e.remove());
  const starField = document.querySelector(".star-field");
  if(starField) starField.remove();
}

function setDefaultTheme(){
  const root = document.documentElement;
  root.style.setProperty("--bg1", "#08111f");
  root.style.setProperty("--bg2", "#131c35");
  document.body.style.background = "linear-gradient(135deg, var(--bg1), var(--bg2))";
  document.body.style.animation = "";
  document.body.style.backgroundSize = "";
}

function createStars(){
  if(document.querySelector(".star-field")) return;
  const field = document.createElement("div");
  field.className = "star-field";
  document.body.appendChild(field);
  for(let i=0;i<120;i++){
    const star = document.createElement("div");
    star.style.left = Math.random()*100 + "vw";
    star.style.top = Math.random()*100 + "vh";
    star.style.animationDuration = (1 + Math.random()*3) + "s";
    field.appendChild(star);
  }
}

function enableNeonGlow(){
  document.querySelectorAll("button, .shopItem").forEach(el => {
    el.style.boxShadow = "0 0 12px #00ffcc, 0 0 30px #00ffcc55";
  });
}

function applyTheme(theme){
  currentTheme = theme;
  trackThemeChange();
  localStorage.setItem("theme", theme);
  clearThemeEffects();

    if(theme === "custom"){
    loadCustomTheme();
    return;
  }

  if(theme === "default"){
    setDefaultTheme();
    return;
  }

  if(theme === "gold"){
    document.documentElement.style.setProperty("--bg1", "#1a1408");
    document.documentElement.style.setProperty("--bg2", "#3d2a00");
    document.body.style.background = 
      "linear-gradient(135deg, #1a1408, #3d2a00, #8c5a00, #ffd700, #ffeb99)";
    document.body.style.backgroundSize = "400% 400%";
    document.body.style.animation = "rainbowMove 8s ease infinite";
    return;
  }

  if(theme === "ocean"){
    document.body.style.background = 
      "linear-gradient(270deg, #001f3d, #003366, #0066cc, #00aaff, #66ddff, #aaddff)";
    document.body.style.backgroundSize = "1200% 1200%";
    document.body.style.animation = "rainbowMove 8s ease infinite";
    return;
  }

  if(theme === "forest"){
    document.body.style.background = 
      "linear-gradient(270deg, #0b1f0b, #1a3d1a, #2e6b2e, #4a9c4a, #7acc7a, #aaffaa)";
    document.body.style.backgroundSize = "1200% 1200%";
    document.body.style.animation = "rainbowMove 8s ease infinite";
    return;
  }

  if(theme === "lava"){
    document.body.style.background = 
      "linear-gradient(270deg, #330000, #661100, #aa2200, #ff4400, #ff8800, #ffcc66)";
    document.body.style.backgroundSize = "1200% 1200%";
    document.body.style.animation = "rainbowMove 8s ease infinite";
    return;
  }

  if(theme === "ice"){
    document.body.style.background = 
      "linear-gradient(270deg, #e6f0ff, #a3d8ff, #66c2ff, #3399ff, #99eeff, #ccffff)";
    document.body.style.backgroundSize = "1200% 1200%";
    document.body.style.animation = "rainbowMove 8s ease infinite";
    return;
  }

  if(theme === "rainbow"){
    document.body.style.background = "linear-gradient(270deg, red, orange, yellow, green, blue, indigo, violet)";
    document.body.style.backgroundSize = "1200% 1200%";
    document.body.style.animation = "rainbowMove 8s ease infinite";
    return;
  }

  if(theme === "neon"){
    document.documentElement.style.setProperty("--bg1", "#001a1a");
    document.documentElement.style.setProperty("--bg2", "#002b36");
    enableNeonGlow();
    return;
  }

  if(theme === "galaxy"){
    document.documentElement.style.setProperty("--bg1", "#050014");
    document.documentElement.style.setProperty("--bg2", "#12002b");
    createStars();
    return;
  }
}



let panicKey = localStorage.getItem("panicKey") || "Tab";
let panicSite = localStorage.getItem("panicSite") || "https://google.com";

function setupPanicKey(){
  const key = prompt("Enter panic key.\nExamples:\nTab\nEscape\nControl\nShift\nAlt\np");
  if(!key) return;
  const site = prompt("Enter panic website URL:", panicSite);
  if(!site) return;

  panicKey = key;
  panicSite = site;
  localStorage.setItem("panicKey", panicKey);
  localStorage.setItem("panicSite", panicSite);
  alert("Panic key saved!");
}

document.addEventListener("keydown", (e) => {
  if(e.key.toLowerCase() === panicKey.toLowerCase() || e.code.toLowerCase() === panicKey.toLowerCase()){
    window.location.href = panicSite;
  }
});

function openShop(){
  const panel = document.getElementById("shopPanel");
  const items = [
    { id: "default", icon: "⚫", name: "Default Theme", cost: 0 },
    { id: "gold", icon: "🟡", name: "Gold Theme", cost: 100 },
    { id: "rainbow", icon: "🌈", name: "Rainbow Theme", cost: 250 },
    { id: "neon", icon: "💚", name: "Neon Button Outline", cost: 500 },
    { id: "galaxy", icon: "🌌", name: "Galaxy Stars", cost: 750 },
    { id: "ocean", icon: "🌊", name: "Ocean Theme", cost: 150 },
    { id: "forest", icon: "🌲", name: "Forest Theme", cost: 150 },
    { id: "lava", icon: "🌋", name: "Lava Theme", cost: 150 },
    { id: "ice", icon: "❄️", name: "Ice Theme", cost: 150 },
    { id: "custom", icon: "🎨", name: "Custom Theme Maker", cost: 400 }
  ];

  panel.innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <h2>🛒 Shop</h2>
    <button class="close-btn" onclick="closeShop()">✕</button>
  </div>
`;

  items.forEach(item => {
    const owned = unlocks[item.id] || item.cost === 0;
    const equipped = (currentTheme === item.id);

    const div = document.createElement("div");
    div.className = "shopItem";
    div.innerHTML = `
      ${item.icon} ${item.name} - ${item.cost} 🍆
      ${equipped ? "<b style='float:right;color:cyan;'>Equipped</b>" : ""}
      ${owned && !equipped ? "<b style='float:right;color:lime;'>Owned</b>" : ""}
    `;

    div.onclick = () => {
      if(item.id === "default"){
        applyTheme("default");
        return;
      }
      if(!unlocks[item.id]){
        buyItem(item.id, item.cost);
        return;
      }
      applyTheme(item.id);
    };
    panel.appendChild(div);
  });

  panel.classList.toggle("open");
}

function buyItem(item, cost){
  if(unlocks[item]){
    alert("Already purchased!");
    return;
  }
  if(admin || eggplants >= cost){
    if(!admin) eggplants -= cost;
    unlocks[item] = true;
    localStorage.setItem("unlocks", JSON.stringify(unlocks));
    updateEggplants();
    applyTheme(item);
    alert("Purchased: " + item);
    openShop();
  } else {
    alert("Not enough 🍆");
  }
}

function closeShop(){
  document.getElementById("shopPanel").classList.remove("open");
}

function openCustomPanel(){
  document.getElementById('customPanel').style.display = 'block';
  updateCustomPreview();
  trackCustomOpened();        // ← Added
}

function rebuildGames(){
  document.querySelectorAll('input[type="button"]').forEach(old => {
    if(old.parentElement && old.parentElement.classList.contains('game')) return;

    const wrapper = document.createElement('div');
    wrapper.className = 'game';

    const btn = document.createElement('button');
    btn.textContent = old.value || old.textContent || "Unnamed Game";

    btn.onclick = () => {
      eggplants++;
      updateEggplants();
      if(typeof old.onclick === "function") old.onclick();
      trackGamePlayed();
    };

    const star = document.createElement('span');
    star.className = 'star';
    star.textContent = favourites.includes(btn.textContent) ? "★" : "☆";

    star.onclick = (e) => {
      e.stopPropagation();
      const name = btn.textContent;
      if(favourites.includes(name)){
        favourites = favourites.filter(x => x !== name);
        star.textContent = "☆";
      } else {
        favourites.push(name);
        star.textContent = "★";
        trackFavoriteAdded();
      }
      localStorage.setItem("favourites", JSON.stringify(favourites));
    };

    wrapper.appendChild(btn);
    wrapper.appendChild(star);
    old.replaceWith(wrapper);
  });
}

function setupSearch(){
  const input = document.getElementById('mainSearch');
  if(!input) return;

  input.addEventListener('input', () => {
    const term = input.value.toLowerCase().trim();

    // Loop through all letter sections
    document.querySelectorAll('.letter-section').forEach(section => {
      let hasVisibleGame = false;

      // Check each game inside this section
      section.querySelectorAll('.game').forEach(game => {
        const btn = game.querySelector('button');
        if(!btn) return;
        
        const name = btn.textContent.toLowerCase();
        const isMatch = term === "" || name.includes(term);
        
        game.style.display = isMatch ? 'block' : 'none';
        
        if(isMatch) hasVisibleGame = true;
      });

      // Hide the entire letter section if no games match
      section.style.display = hasVisibleGame ? 'block' : 'none';
    });
  });
}

document.addEventListener('keydown',(e)=>{
 if(e.ctrlKey && e.shiftKey && e.key.toLowerCase()==='z'){
   window.location.href='https://classroom.google.com/';
 }
});

window.addEventListener('load',()=>{
  updateEggplants();
  createEggplants();
  favourites = JSON.parse(localStorage.getItem("favourites") || "[]");
  applyTheme(currentTheme);

  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/gh/bubbls/ugs-singlefile@main/game.js';
  script.onload = () => setTimeout(() => { rebuildGames(); setupSearch(); }, 1200);
  document.body.appendChild(script);

    // Custom theme slider live update
  const customInputs = document.querySelectorAll('#customPanel input');
  customInputs.forEach(input => {
    input.addEventListener('input', updateCustomPreview);
  });

  setTimeout(() => { rebuildGames(); setupSearch(); }, 3000);

  if(localStorage.getItem("code") === "Eggplant4Lyfe"){

});

    <script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [
  { id: 1, name: "Play 10 Games", goal: 10, progress: 0, reward: 50, completed: false },
  { id: 2, name: "Favorite 5 Games", goal: 5, progress: 0, reward: 80, completed: false },
  { id: 3, name: "Change Theme 3 Times", goal: 3, progress: 0, reward: 60, completed: false },
  { id: 4, name: "Open Custom Theme Creator", goal: 1, progress: 0, reward: 100, completed: false },
  { id: 5, name: "Use Search 5 Times", goal: 5, progress: 0, reward: 40, completed: false }
];

function saveTasks() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function openTasksPanel() {
  const panel = document.getElementById('tasksPanel');
  renderTasks();
  panel.style.transform = 'translateX(0)';
}

function closeTasksPanel() {
  document.getElementById('tasksPanel').style.transform = 'translateX(-100%)';
}

function renderTasks() {
  const container = document.getElementById('tasksList');
  container.innerHTML = '';

  tasks.forEach(task => {
    const progressPercent = Math.min((task.progress / task.goal) * 100, 100);
    
    const div = document.createElement('div');
    div.style.cssText = `background:rgba(255,255,255,0.08); padding:15px; border-radius:15px; margin:12px 0; position:relative;`;
    
    div.innerHTML = `
      <strong>${task.name}</strong><br>
      <small style="color:#aaa;">${task.progress} / ${task.goal}</small>
      <div style="height:8px; background:#333; border-radius:10px; margin:8px 0; overflow:hidden;">
        <div style="height:100%; width:${progressPercent}%; background:linear-gradient(to right, #ff8800, #ffdd88); transition:width 0.4s;"></div>
      </div>
      <span style="color:#ffdd88; font-weight:600;">+${task.reward} 🍆</span>
      
      ${task.completed ? 
        `<button onclick="claimReward(${task.id})" style="position:absolute; right:15px; top:15px; padding:8px 16px; background:#00cc66; color:white; border:none; border-radius:8px; font-size:14px; cursor:pointer;">Claim</button>` 
        : ''}
    `;
    container.appendChild(div);
  });
}

function claimReward(id) {
  const task = tasks.find(t => t.id === id);
  if (!task || !task.completed) {
    showModal("Error", "This task is not completed yet.", "#ff6666");
    return;
  }

  eggplants += task.reward;
  updateEggplants();
  
  showModal("Reward Claimed!", `You earned <b>+${task.reward} 🍆</b>!`, "#00ffaa");
  
  // Reset task
  task.progress = 0;
  task.completed = false;
  saveTasks();
  renderTasks();
}

function claimAllRewards() {
  let total = 0;
  tasks.forEach(task => {
    if (task.completed) {
      total += task.reward;
      task.progress = 0;
      task.completed = false;
    }
  });

  if (total > 0) {
    eggplants += total;
    updateEggplants();
    saveTasks();
    renderTasks();
    showModal("All Rewards Claimed!", `You earned <b>+${total} 🍆</b>!`, "#00ffaa");
  } else {
    showModal("Nothing to Claim", "Complete some tasks first!", "#ffcc66");
  }
}

// Progress trackers
function trackGamePlayed() {
  const task = tasks.find(t => t.id === 1);
  if (task && !task.completed) {
    task.progress++;
    if (task.progress >= task.goal) task.completed = true;
    saveTasks();
    if (document.getElementById('tasksPanel').style.transform === 'translateX(0)') renderTasks();
  }
}

function trackFavoriteAdded() {
  const task = tasks.find(t => t.id === 2);
  if (task && !task.completed) {
    task.progress = Math.min(task.progress + 1, task.goal);
    if (task.progress >= task.goal) task.completed = true;
    saveTasks();
  }
}

function trackThemeChange() {
  const task = tasks.find(t => t.id === 3);
  if (task && !task.completed) {
    task.progress++;
    if (task.progress >= task.goal) task.completed = true;
    saveTasks();
  }
}

function trackCustomOpened() {
  const task = tasks.find(t => t.id === 4);
  if (task && !task.completed) {
    task.progress = 1;
    task.completed = true;
    saveTasks();
  }
}

    alert("👑 Admin Enabled!");
    location.reload();
  }else{

}

function openCustomPanel(){
  document.getElementById('customPanel').style.display = 'block';
  updateCustomPreview();
}

function closeCustomPanel(){
  document.getElementById('customPanel').style.display = 'none';
}

function updateCustomPreview(){
  const c1 = document.getElementById('customC1').value;
  const c2 = document.getElementById('customC2').value;
  const c3 = document.getElementById('customC3').value;
  const c4 = document.getElementById('customC4').value;
  const speed = document.getElementById('customSpeed').value;

  document.getElementById('speedVal').textContent = speed;

  const preview = document.getElementById('customPreview');
  preview.style.background = `linear-gradient(270deg, ${c1}, ${c2}, ${c3}, ${c4})`;
  preview.style.backgroundSize = "1200% 1200%";
  preview.style.animation = `rainbowMove ${speed}s ease infinite`;
}

function applyCustomToLive(){
  const c1 = document.getElementById('customC1').value;
  const c2 = document.getElementById('customC2').value;
  const c3 = document.getElementById('customC3').value;
  const c4 = document.getElementById('customC4').value;
  const speed = document.getElementById('customSpeed').value;

  document.body.style.background = `linear-gradient(270deg, ${c1}, ${c2}, ${c3}, ${c4})`;
  document.body.style.backgroundSize = "1200% 1200%";
  document.body.style.animation = `rainbowMove ${speed}s ease infinite`;
  
  currentTheme = "custom";
  localStorage.setItem("theme", "custom");
  closeCustomPanel();
  alert("✅ Custom theme applied live!");
}

function saveCustomTheme(){
  const themeData = {
    c1: document.getElementById('customC1').value,
    c2: document.getElementById('customC2').value,
    c3: document.getElementById('customC3').value,
    c4: document.getElementById('customC4').value,
    speed: document.getElementById('customSpeed').value
  };
  localStorage.setItem("customTheme", JSON.stringify(themeData));
  alert("💾 Custom theme saved! You can load it later.");
}

function loadCustomTheme(){
  const saved = localStorage.getItem("customTheme");
  if(!saved) {
    alert("No custom theme saved yet. Create one first.");
    return;
  }
  const t = JSON.parse(saved);

  document.body.style.background = `linear-gradient(270deg, ${t.c1}, ${t.c2}, ${t.c3}, ${t.c4})`;
  document.body.style.backgroundSize = "1200% 1200%";
  document.body.style.animation = `rainbowMove ${t.speed}s ease infinite`;
}

function showModal(title, message, color){
  alert(title + "\n\n" + message.replace(/<[^>]*>/g, ""));
}
